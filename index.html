<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Alışveriş Listesi | AI Destekli</title>
    <!-- Tailwind CSS Script -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { zinc: { 950: '#09090b' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 10px; }
        .dragging { opacity: 0.5; background: #f4f4f5; }
        .empty-lines-bg {
            background-image: linear-gradient(to bottom, #f4f4f5 1px, transparent 1px);
            background-size: 100% 48px;
        }
        .ai-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (max-width: 768px) {
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #sidebar.visible-mobile { transform: translateX(0); }
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
    </style>
</head>
<body class="bg-white text-zinc-900 h-screen overflow-hidden antialiased">
    <!-- Hidden File Input for AI -->
    <input type="file" id="image-upload" accept="image/*" class="hidden">

    <div class="flex h-screen relative">
        
        <!-- Sidebar Backdrop (Mobile Only) -->
        <div id="sidebar-backdrop" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

        <!-- Sidebar: List Management -->
        <aside id="sidebar" class="fixed md:relative inset-y-0 left-0 w-72 bg-zinc-50 border-r border-zinc-200 flex flex-col p-5 z-40 hidden-mobile md:translate-x-0 shadow-2xl md:shadow-none">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <h1 class="text-lg font-bold tracking-tight">Listelerim</h1>
                    <!-- Cloud Sync Indicator -->
                    <div id="sync-indicator" class="flex items-center gap-1.5 px-2 py-0.5 bg-green-50 rounded-full border border-green-100 opacity-0 transition-opacity">
                        <div class="status-dot animate-pulse"></div>
                        <span class="text-[8px] font-black uppercase text-green-600 tracking-widest">BULUT</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button id="add-list-btn" title="Yeni Liste Ekle" class="bg-zinc-900 text-white w-7 h-7 rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <button class="md:hidden p-1 text-zinc-400" onclick="toggleSidebar()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <input type="text" id="list-search" placeholder="Liste ara..." class="w-full px-3 py-1.5 bg-white border border-zinc-200 rounded-lg text-xs outline-none focus:border-zinc-900 transition-colors">
            </div>
            <nav id="lists-nav" class="flex-1 overflow-y-auto custom-scrollbar space-y-0.5"></nav>
            
            <div class="mt-4 pt-4 border-t border-zinc-200">
                <button id="open-settings-btn" class="flex items-center gap-2 text-zinc-400 hover:text-zinc-900 text-xs font-bold transition-colors w-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Ayarlar
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col bg-white overflow-hidden relative">
            
            <!-- Mobile Header -->
            <header class="md:hidden flex items-center justify-between px-4 h-14 border-b border-zinc-100 bg-white/80 backdrop-blur-md sticky top-0 z-20">
                <button class="p-2 -ml-2 text-zinc-900" onclick="toggleSidebar()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div id="mobile-title" class="text-sm font-extrabold tracking-tight truncate flex-1 px-4 text-center">Alışveriş Listesi</div>
                
                <div class="flex items-center gap-1">
                    <button onclick="document.getElementById('image-upload').click()" class="p-2 text-zinc-900" title="Fotoğraf Tara">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </button>
                    <div id="mobile-counter" class="text-[10px] font-black tabular-nums bg-zinc-900 text-white px-2 py-1 rounded-md">--</div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto px-4 md:px-8 py-4 md:py-6 max-w-4xl mx-auto w-full flex flex-col pt-4 md:pt-6">
                <!-- Desktop Header -->
                <div class="hidden md:flex justify-between items-end mb-4 border-b-2 border-zinc-900 pb-1">
                    <h2 id="active-list-title" class="text-2xl font-extrabold tracking-tighter outline-none focus:bg-zinc-50 rounded flex-1" contenteditable="true">Seçili liste yok</h2>
                    <div class="flex items-center gap-1.5 h-8">
                        <button onclick="document.getElementById('image-upload').click()" class="p-1.5 text-zinc-400 hover:text-zinc-900 hover:bg-zinc-100 rounded-lg transition-all" title="Fotoğraf Tara">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                        </button>
                        <span id="list-status-counter" class="text-2xl text-zinc-200 font-black tracking-tighter tabular-nums px-2 border-l border-zinc-100 h-full flex items-center"></span>
                        <button id="delete-active-list-btn" class="p-1.5 text-zinc-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all" title="Listeyi Sil">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>

                <section class="mb-6 sticky top-0 z-10 md:static bg-white/95 backdrop-blur-sm -mx-4 px-4 py-2 md:m-0 md:p-0 md:bg-transparent">
                    <form id="add-item-form" class="flex flex-col gap-2">
                        <div class="flex gap-1.5 items-center bg-zinc-50/50 p-1 rounded-xl border border-zinc-100 shadow-sm">
                            <input type="text" id="item-title" placeholder="Ürün adını yazın..." required class="flex-1 px-3 py-2 text-sm bg-transparent outline-none font-semibold text-zinc-900 border-r border-zinc-200">
                            <input type="text" id="item-quantity" placeholder="Miktar" class="w-16 px-2 py-2 text-xs bg-transparent outline-none italic text-zinc-500 border-r border-zinc-200">
                            <input type="text" id="item-brand" placeholder="Marka" class="w-16 px-2 py-2 text-[10px] bg-transparent outline-none font-bold uppercase tracking-tighter text-zinc-400">
                            
                            <div class="flex gap-1 items-center pl-1">
                                <button type="submit" class="bg-zinc-900 text-white p-2 rounded-lg hover:opacity-90 active:scale-95 transition-all shadow-md">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                </button>
                            </div>
                        </div>
                    </form>
                </section>

                <section class="flex-1 relative">
                    <div class="absolute inset-0 empty-lines-bg pointer-events-none opacity-40"></div>
                    <ul id="items-list" class="relative z-10"></ul>
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 bg-black/30 backdrop-blur-sm grid place-items-center z-50 hidden p-4">
        <div class="bg-white p-6 md:p-8 rounded-2xl w-full max-w-sm shadow-2xl border border-zinc-100">
            <h3 class="text-xl font-bold tracking-tight mb-4">Yeni Liste Oluştur</h3>
            <input type="text" id="modal-input" placeholder="Liste ismini yazın..." class="w-full px-4 py-2.5 border border-zinc-200 rounded-lg mb-6 focus:border-zinc-900 outline-none">
            <div class="flex justify-end gap-2">
                <button id="modal-cancel" class="px-4 py-2 text-zinc-500 font-bold hover:bg-zinc-100 rounded-lg transition-colors">İptal</button>
                <button id="modal-confirm" class="px-5 py-2 bg-zinc-900 text-white font-bold rounded-lg hover:opacity-90">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- AI Review Modal -->
    <div id="ai-review-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md grid place-items-center z-50 hidden p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] flex flex-col shadow-3xl overflow-hidden border border-zinc-100">
            <div class="p-5 border-b border-zinc-100 flex justify-between items-center bg-zinc-50/50">
                <div>
                    <h3 class="text-lg font-black tracking-tight">Tarama Sonuçları</h3>
                    <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Ürünleri kontrol edin</p>
                </div>
            </div>
            <div id="ai-review-content" class="flex-1 overflow-y-auto p-4 custom-scrollbar min-h-[300px]"></div>
            
            <div id="loading-state" class="flex flex-col items-center justify-center py-20 gap-4 hidden">
                <div class="relative w-10 h-10">
                    <div class="absolute inset-0 border-4 border-zinc-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-zinc-900 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <span id="ai-loading-status" class="text-[10px] font-black text-zinc-900 uppercase tracking-widest text-center px-4">Görsel Analiz Ediliyor</span>
                <span id="ai-loading-detail" class="text-[9px] text-zinc-400 font-bold uppercase tracking-widest ai-pulse italic">Lütfen Bekleyin...</span>
            </div>

            <div id="ai-modal-footer" class="p-5 bg-zinc-50/80 border-t border-zinc-100 flex justify-between gap-3">
                <button id="ai-review-cancel" class="px-6 py-2.5 text-sm font-bold text-zinc-500 hover:text-zinc-900">İptal</button>
                <button id="ai-review-confirm" class="flex-1 py-2.5 bg-zinc-900 text-white text-sm font-extrabold rounded-2xl shadow-lg">Onayla ve Ekle</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/30 backdrop-blur-sm grid place-items-center z-50 hidden p-4">
        <div class="bg-white p-6 md:p-8 rounded-2xl w-full max-w-sm shadow-2xl border border-zinc-100">
            <h3 class="text-xl font-bold tracking-tight mb-6">Ayarlar</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-zinc-400 mb-1">Gemini API Anahtarı</label>
                    <input type="password" id="api-key-input" class="w-full px-4 py-2.5 border border-zinc-200 rounded-lg outline-none focus:border-zinc-900 text-sm">
                    <p class="text-[9px] text-zinc-400 mt-2 italic font-medium">* Bu anahtar tüm kullanıcılar için ortaktır ve bulut üzerinde senkronize edilir.</p>
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-8">
                <button id="settings-cancel" class="px-4 py-2 text-zinc-500 font-bold hover:bg-zinc-100 rounded-lg">Kapat</button>
                <button id="settings-save" class="px-5 py-2 bg-zinc-900 text-white font-bold rounded-lg">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v10 modular) via CDN -->
    <script type="module" src="app.js"></script>
</body>
</html>
